<script type="text/javascript">
    const orgWarn = console.warn;
    console.warn = function() {
        if (typeof arguments[0] === 'string' && arguments[0].includes('LaTeX')) {}
        else orgWarn.apply(console, arguments);
    };

    document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
            delimiters: [
                {left: '@f$', right: '@f$', display: false},
                {left: '@f[', right: '@f]', display: true},
                {left: '\\f$', right: '\\f$', display: false},
                {left: '\\f[', right: '\\f]', display: true},
                {left: '\$', right: '\$', display: false},
                {left: '@$', right: '@$', display: true}
            ]
        });
    });
</script>
<!-- 公式渲染 -->
<script type="text/javascript">
    let lastUrl = null;  // 记录聚焦前的页面
    let lastPos = null;  // 记录聚焦前的位置

    window.addEventListener('resize', function() {
        // 调整页面大小时,同步更新html的宽高
        const html = document.querySelector('html');
        if (html) {
            html.style.width = window.innerWidth + 'px';
            html.style.height = window.innerHeight + 'px';
        }
    })

    window.addEventListener('popstate', function(event) {
        // 当检测到用户点击标题聚焦后,记录当前页面和位置
        const [org, _] = location.href.split('#');
        if (_) {
            lastUrl = org;
            lastPos = document.getElementById('doc-content').scrollTop;
        }
    })
    document.addEventListener('DOMContentLoaded', function() {
        // 用户不在需要聚焦标题时,还原原来的页面和位置
        const container = document.getElementById('doc-content');
        container?.addEventListener('scroll', function () {
            const scrollY = container.scrollTop;
            if (Math.abs(scrollY - lastPos) > container.offsetHeight / 2) {
                if (lastUrl) {
                    location.href = lastUrl;
                    lastUrl = null;
                }
            }
        })
    })
</script>
