name: '运行测试'
description: '运行 CTest 测试套件'
inputs:
    build-dir:
        description: '构建目录'
        required: false
        default: 'build'
    test-regex:
        description: '测试正则表达式'
        required: false
        default: ''
    output-on-failure:
        description: '失败时输出详细信息'
        required: false
        default: 'true'
    parallel:
        description: '并行测试数量'
        required: false
        default: '4'
    timeout:
        description: '测试超时时间（秒）'
        required: false
        default: '300'

runs:
    using: 'composite'
    steps:
        -   name: 运行 CTest
            shell: bash
            run: |
                cd ${{ inputs.build-dir }}
                
                # 构建 CTest 参数
                CTEST_ARGS="--output-on-failure"
                
                if [[ "${{ inputs.output-on-failure }}" == "true" ]]; then
                  CTEST_ARGS="$CTEST_ARGS --output-on-failure"
                fi
                
                if [[ "${{ inputs.parallel }}" != "0" ]]; then
                  CTEST_ARGS="$CTEST_ARGS --parallel ${{ inputs.parallel }}"
                fi
                
                if [[ "${{ inputs.test-regex }}" != "" ]]; then
                  CTEST_ARGS="$CTEST_ARGS -R '${{ inputs.test-regex }}'"
                fi
                
                if [[ "${{ inputs.timeout }}" != "" ]]; then
                  CTEST_ARGS="$CTEST_ARGS --timeout ${{ inputs.timeout }}"
                fi
                
                echo "运行: ctest $CTEST_ARGS"
                
                # 运行测试
                ctest $CTEST_ARGS
                
                # 如果失败，显示测试输出
                if [[ $? -ne 0 ]]; then
                  echo "=== 失败的测试输出 ==="
                  find Testing/Temporary -name "LastTest.log" -exec cat {} \;
                fi

        -   name: 生成测试报告
            shell: bash
            run: |
                cd ${{ inputs.build-dir }}
                
                # 生成 JUnit 格式报告
                if [[ -f "Testing/TAG" ]]; then
                  TAG=$(cat Testing/TAG)
                  ctest --output-junit "test-results-$TAG.xml"
                
                  echo "测试报告生成: ${{ inputs.build-dir }}/test-results-$TAG.xml"
                fi

        -   name: 收集覆盖率数据（如果启用）
            shell: bash
            run: |
                cd ${{ inputs.build-dir }}
                
                if [[ -f "CMakeCache.txt" ]] && grep -q "ENABLE_COVERAGE:BOOL=ON" CMakeCache.txt; then
                  echo "收集覆盖率数据..."
                
                  # 安装 lcov（如果未安装）
                  if ! command -v lcov &> /dev/null; then
                    sudo apt-get install -y lcov || brew install lcov || echo "无法安装 lcov"
                  fi
                
                  # 收集覆盖率
                  if command -v lcov &> /dev/null; then
                    lcov --capture --directory . --output-file coverage.info
                    lcov --remove coverage.info '/usr/*' '*/test/*' '*/extern/*' --output-file coverage-filtered.info
                    lcov --list coverage-filtered.info
                
                    echo "覆盖率报告生成: ${{ inputs.build-dir }}/coverage-filtered.info"
                  fi
                else
                  echo "覆盖率未启用，跳过收集"
                fi