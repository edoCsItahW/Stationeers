name: IC10 Node Bindings Build & Test
run-name: IC10 Node | IC10 Node 绑定

on:
    workflow_call:
        inputs:
            os:
                description: 'Operating system'
                type: string
                required: false
                default: 'ubuntu-latest'
            cmake-version:
                description: 'CMake version'
                type: string
                required: false
                default: '4.2.1'
            node-version:
                description: 'Node.js version'
                type: string
                required: false
                default: '26'
            build-type:
                description: 'Build type'
                type: string
                required: false
                default: 'Release'
            run-tests:
                description: 'Whether to run tests (C++ + Jest)'
                type: boolean
                required: false
                default: true
            upload-artifact:
                description: 'Whether to upload build artifacts'
                type: boolean
                required: false
                default: false
            artifact-name:
                description: 'Artifact name prefix'
                type: string
                required: false
                default: 'ic10-node'
        outputs:
            artifact-name:
                description: 'Name of the uploaded artifact'
                value: ${{ jobs.build.outputs.artifact-name }}

jobs:
    build:
        name: build ${{ inputs.os }} | 构建${{ inputs.os }}
        runs-on: ${{ inputs.os }}
        outputs:
            artifact-name: ${{ steps.artifact.outputs.name }}

        steps:
            -   name: Checkout source code | 检出源码
                uses: actions/checkout@v6

            -   name: Setup build environment | 设置构建环境
                uses: ./.github/actions/setup-build-env
                with:
                    os: ${{ inputs.os }}
                    cmake-version: ${{ inputs.cmake-version }}
                    node-version: ${{ inputs.node-version }}
                    pnpm-version: '9'
                    cache-key-prefix: ic10-node

            -   name: Install pnpm dependencies | 安装 pnpm 依赖
                working-directory: code/backend/compiler
                shell: bash
                run: pnpm i --ignore-workspace

            -   name: Download Node headers via node-gyp | 通过 node-gyp 下载 Node 头文件
                working-directory: code/backend/compiler
                shell: bash
                run: |
                    pnpm add -D node-gyp --ignore-workspace
                    npx node-gyp install

            -   name: Configure CMake | 配置 CMake
                shell: bash
                run: |
                    CMAKE_ARGS="-B build -S code/backend/compiler"
                    CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
                    CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_STANDARD=23"
                    CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_STANDARD_REQUIRED=ON"
                    CMAKE_ARGS="$CMAKE_ARGS -DBUILD_IC10=ON"
                    CMAKE_ARGS="$CMAKE_ARGS -DBUILD_STATIONSCRIPT=OFF"
                    CMAKE_ARGS="$CMAKE_ARGS -DBUILD_NODE_BINDINGS=ON"
                    CMAKE_ARGS="$CMAKE_ARGS -DBUILD_PYTHON_BINDINGS=OFF"
                    CMAKE_ARGS="$CMAKE_ARGS -DBUILD_TESTS=${{ inputs.run-tests && 'ON' || 'OFF' }}"
                    CMAKE_ARGS="$CMAKE_ARGS -DENABLE_CCACHE=ON"
                    CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_POSITION_INDEPENDENT_CODE=ON"
                    CMAKE_ARGS="$CMAKE_ARGS -DNODE_ADDON_API_DIR=$GITHUB_WORKSPACE/code/backend/compiler/node_modules/node-addon-api"

                    if [[ "${{ inputs.os }}" == "ubuntu-latest" ]]; then
                      CMAKE_ARGS="$CMAKE_ARGS -G Ninja"
                      CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld"
                    fi

                    echo "CMake args: $CMAKE_ARGS"
                    cmake $CMAKE_ARGS

            -   name: Build | 编译
                shell: bash
                run: |
                    cmake --build build --config ${{ inputs.build-type }} --parallel 4

            -   name: Show ccache stats | 显示缓存统计
                if: inputs.os == 'ubuntu-latest'
                shell: bash
                run: ccache --show-stats

            -   name: Show sccache stats | 显示缓存统计
                if: inputs.os == 'windows-latest'
                shell: pwsh
                run: sccache --show-stats

            -   name: Run C++ tests (CTest) | 运行 C++ 测试
                if: inputs.run-tests
                shell: bash
                run: |
                    cd build
                    ctest --output-on-failure --parallel 4 -C ${{ inputs.build-type }} -R ic10

            -   name: Run Node.js tests (Jest) | 运行 Node.js 测试
                if: inputs.run-tests
                working-directory: code/backend/compiler
                shell: bash
                run: |
                    cp build/exports/IC10/node/ic10-node-api.node tests/node/ic10/ 2>/dev/null || true
                    pnpm test

            -   name: Set artifact name | 设置产物名称
                id: artifact
                if: inputs.upload-artifact
                shell: bash
                run: |
                    NAME="${{ inputs.artifact-name }}-${{ inputs.os }}"
                    echo "name=$NAME" >> $GITHUB_OUTPUT

            -   name: Upload build artifacts | 上传构建产物
                if: inputs.upload-artifact
                uses: actions/upload-artifact@v6
                with:
                    name: ${{ steps.artifact.outputs.name }}
                    path: |
                        build/exports/IC10/node/**
                        build/bin/**
                    retention-days: 7
