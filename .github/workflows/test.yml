name: Test
run-name: Test | 测试

on:
    workflow_run:
        workflows: [ Build ]  # 监听 build.yml 工作流
        types:
            - completed

jobs:
    test:
        name: test ${{ matrix.os }} | 测试${{ matrix.os }}
        runs-on: ${{ matrix.os }}

        # 只在前一个工作流成功时运行
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest ]
                include:
                    -   os: ubuntu-latest
                        artifact-name: build-ubuntu-latest
                    -   os: windows-latest
                        artifact-name: build-windows-latest

        steps:
            -   name: Debug workflow_run info
                run: |
                    echo "Event name: ${{ github.event_name }}"
                    echo "Build Run ID: ${{ github.event.workflow_run.id }}"
                    echo "Build Run Attempt: ${{ github.event.workflow_run.run_attempt }}"
                    echo "Build Conclusion: ${{ github.event.workflow_run.conclusion }}"
                    echo "Artifact name to download: ${{ matrix.artifact-name }}"

            # 步骤1：检出源码（为了获取测试相关文件）
            -   name: Checkout source code | 检出源码
                uses: actions/checkout@v6

            # 步骤2：下载构建产物
            -   name: Download build artifacts | 下载构建产物
                uses: actions/download-artifact@v6
                with:
                    name: ${{ matrix.artifact-name }}
                    path: build/
                    run-id: ${{ github.event.workflow_run.id }}

            # 步骤3：安装必要工具
            -   name: Install dependencies | 安装依赖
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y cppcheck valgrind

            -   name: Install dependencies (Windows) | 安装依赖（Windows）
                if: matrix.os == 'windows-latest'
                shell: pwsh
                run: |
                    choco install -y cppcheck

            # 步骤4：运行测试
            -   name: Run Tests (Linux) | 运行测试（Linux）
                if: matrix.os == 'ubuntu-latest'
                run: |
                    cd build
                    # 运行单元测试
                    ctest --output-on-failure --parallel 4
                    # 可选：运行内存检查
                    # ctest -T memcheck

            -   name: Run Tests (Windows) | 运行测试（Windows）
                if: matrix.os == 'windows-latest'
                shell: pwsh
                run: |
                    cd build
                    ctest -C Release --output-on-failure --parallel 4

            # 步骤5：代码静态分析
            -   name: Static analysis with cppcheck | Cppcheck 静态分析
                run: |
                    cppcheck --enable=all --suppress=missingIncludeSystem \
                    --suppress=unusedFunction --error-exitcode=1 \
                    --inline-suppr --std=c++23 \
                    -I common/include \
                    -I IC10/include \
                    -I StationScript/include \
                    common/src IC10/src StationScript/src 2> cppcheck-report.txt
                continue-on-error: true  # 静态分析失败不阻塞流程

            # 步骤6：上传测试报告
            -   name: Upload test reports | 上传测试报告
                uses: actions/upload-artifact@v6
                if: always()
                with:
                    name: test-reports-${{ matrix.os }}
                    path: |
                        build/Testing/**/*.xml
                        cppcheck-report.txt
                    retention-days: 30


    static-analysis:
        name: Static Analysis | 静态分析
        runs-on: ubuntu-latest
        needs: test

        steps:
            # 步骤1：检出源码
            -   name: Checkout source code | 检出源码
                uses: actions/checkout@v6

            # 步骤2：按照分析工具
            -   name: Install Analysis Tools | 安装分析工具
                run: |
                    sudo apt-get update
                    sudo apt-get install -y cppcheck clang-tidy-22 clang-format-22

            # 步骤3：Cppcheck 静态分析
            -   name: Cppcheck Analysis | Cppcheck分析
                run: |
                    cppcheck --enable=all --suppress=missingIncludeSystem \
                             --suppress=unusedFunction --error-exitcode=1 \
                             --inline-suppr --std=c++23 -I include src/ 2> cppcheck-report.txt

            # 步骤4：Clang-tidy 分析
            -   name: Clang-tidy Analysis | Clang-tidy分析
                run: |
                    # 生成compile_commands.json
                    cmake -B build-tidy -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
                    
                    # 运行clang-tidy
                    find src include -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | \
                    xargs -I {} clang-tidy-22 -p build-tidy -std=c++23 -I include 2> clang-tidy-report.txt

            # 步骤5：Clang-format检查
            -   name: Clang-format Check | Clang-format检查
                run: |
                    find src include -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | \
                    xargs clang-format-22 --dry-run --Werror

            # 步骤6：上传分析报告
            -   name: Upload analysis reports | 上传分析报告
                uses: actions/upload-artifact@v6
                with:
                    name: static-analysis-reports
                    path: |
                        cppcheck-report.txt
                        clang-tidy-report.txt
                        clang-format-report.txt
                    retention-days: 30
