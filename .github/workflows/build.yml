name: Build
run-name: Build | 构建

on:
    push:
        branches: [ main, develop, test ]
    pull_request:
        branches: [ main, develop ]
    workflow_dispatch:

jobs:
    build:
        name: build ${{ matrix.os }} | 构建${{ matrix.os }}

        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false  # 一个平台失败不影响另一个平台继续运行
            matrix:
                os: [ ubuntu-latest, windows-latest ]  # 目标操作系统
                cmake-version: [ '4.2.1' ]  # 统一 CMake 版本

        steps:
            # Checkout 仓库代码（获取最新提交）
            -   name: Checkout source code | 检出源码
                uses: actions/checkout@v6

            # 安装 Node.js 和 pnpm
            -   name: Setup Node.js | 安装 Node.js
                uses: actions/setup-node@v6.4.0
                with:
                    node-version: 26

            -   name: Setup pnpm | 安装 pnpm
                uses: pnpm/action-setup@v4
                with:
                    version: 9

            -   name: Install dependencies (pnpm) | 下载依赖（pnpm）
                working-directory: code/backend/compiler
                run: pnpm i --ignore-workspace

            -   name: Download Node headers via node-gyp | 通过 node-gyp 下载 Node 头文件
                working-directory: code/backend/compiler
                run: |
                    pnpm add -D node-gyp --ignore-workspace
                    npx node-gyp install

            # 安装指定版本的 CMake（确保跨平台版本一致）
            -   name: Install CMake ${{ matrix.cmake-version }} | 安装${{ matrix.cmake-version }}的 CMake
                uses: jwlawson/actions-setup-cmake@v2.2.0
                with:
                    cmake-version: ${{ matrix.cmake-version }}

            # Windows 环境专属 - 初始化 MSVC 编译器环境
            -   name: Configure MSVC environment | 配置 MSVC 编译器环境
                if: matrix.os == 'windows-latest'
                uses: ilammy/msvc-dev-cmd@v1.13.0

            # Windows 环境专属 - 安装 Ninja
            -   name: Install Ninja (Windows) | 安装 Ninja（Windows）
                if: matrix.os == 'windows-latest'
                run: choco install ninja -y

            # Linux 环境专属 - 确保 GCC 版本及依赖
            -   name: Install GCC 15 | 安装 GCC 15
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo add-apt-repository ppa:ubuntu-toolchain-r/test
                    sudo apt-get update
                    sudo apt-get install -y g++-15 ccache lld
                    sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100
                    sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100

            # 配置 CMake
            -   name: Configure CMake (Linux) | 配置CMake（Linux）
                if: matrix.os == 'ubuntu-latest'
                run: |
                    cmake -B build -S code/backend/compiler \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DCMAKE_CXX_STANDARD=23 \
                      -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                      -DCMAKE_C_COMPILER=gcc \
                      -DCMAKE_CXX_COMPILER=g++ \
                      -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld" \
                      -DNODE_ADDON_API_DIR=${{ github.workspace }}/code/backend/compiler/node_modules/node-addon-api \
                      -DCMAKE_POSITION_INDEPENDENT_CODE=ON

            -   name: Configure CMake (Windows) | 配置CMake（Windows）
                if: matrix.os == 'windows-latest'
                shell: pwsh
                run: |
                    cmake -B build -S code/backend/compiler `
                      -DCMAKE_BUILD_TYPE=Release `
                      -DCMAKE_CXX_STANDARD=23 `
                      -DCMAKE_CXX_STANDARD_REQUIRED=ON

            # 编译（Release 模式，并行加速）
            -   name: Build (Linux) | 编译（Linux）
                if: matrix.os == 'ubuntu-latest'
                run: |
                    cd build
                    cmake --build . --parallel 4

            -   name: Build (Windows) | 编译（Windows）
                if: matrix.os == 'windows-latest'
                shell: pwsh
                run: cmake --build build --config Release --parallel 4

            # 上传构建产物
            -   name: Upload build artifacts | 上传构建产物
                uses: actions/upload-artifact@v6
                with:
                    name: build-${{ matrix.os }}
                    path: |
                        build/**
                        !build/CMakeFiles/
                    retention-days: 7
