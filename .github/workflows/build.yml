name: Build
run-name: Build | 构建

on:
    push:
        branches: [ main, develop, feature ]
    pull_request:
        branches: [ main ]

jobs:
    build:
        name: build ${{ matrix.os }} | 构建${{ matrix.os }}

        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false  # 一个平台失败不影响另一个平台继续运行
            matrix:
                os: [ ubuntu-latest, windows-latest ]  # 目标操作系统
                cmake-version: [ '4.2.1' ]  # 统一 CMake 版本

        steps:
            # 步骤1：Checkout 仓库代码（获取最新提交）
            -   name: Checkout source code | 检出源码
                uses: actions/checkout@v6

            # 步骤2：安装指定版本的 CMake（确保跨平台版本一致）
            -   name: Install CMake ${{ matrix.cmake-version }} | 安装${{ matrix.cmake-version }}的 CMake
                uses: jwlawson/actions-setup-cmake@v2.0.2
                with:
                    cmake-version: ${{ matrix.cmake-version }}

            # 步骤3：Windows 环境专属 - 初始化 MSVC 编译器环境
            -   name: Configure MSVC environment | 配置 MSVC 编译器环境
                if: matrix.os == 'windows-latest'
                uses: ilammy/msvc-dev-cmd@v1.13.0

            # 步骤4：Windows 环境专属 - 安装 Ninja
            -   name: Install Ninja (Windows) | 安装 Ninja（Windows）
                if: matrix.os == 'windows-latest'
                run: choco install ninja -y

            # 步骤5：Linux 环境专属 - 确保 GCC 版本及依赖
            -   name: Install Clang | 安装 Clang
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y wget gnupg lsb-release
                    wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
                    chmod +x /tmp/llvm.sh
                    sudo /tmp/llvm.sh 22
                    sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100
                    sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 100

            -   name: Set Clang as default compiler | 设置 Clang 为默认编译器
                if: matrix.os == 'ubuntu-latest'
                run: |
                    echo "CC=clang" >> $GITHUB_ENV
                    echo "CXX=clang++" >> $GITHUB_ENV

            # 步骤6：CMake 配置（Release 模式，生成构建文件）
            -   name: Configure CMake (Linux) | 配置CMake（Linux）
                if: matrix.os == 'ubuntu-latest'
                run: |
                    cmake -B build -S code/backend/compiler \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DCMAKE_CXX_STANDARD=23 \
                      -DCMAKE_CXX_STANDARD_REQUIRED=ON \
                      -DCMAKE_C_COMPILER=clang \
                      -DCMAKE_CXX_COMPILER=clang++ \
                      -DCMAKE_CXX_FLAGS="-stdlib=libc++"

            -   name: Configure CMake (Windows) | 配置CMake（Windows）
                if: matrix.os == 'windows-latest'
                shell: pwsh
                run: |
                    cmake -B build -S code/backend/compiler `
                      -DCMAKE_BUILD_TYPE=Release `
                      -DCMAKE_CXX_STANDARD=23 `
                      -DCMAKE_CXX_STANDARD_REQUIRED=ON

            # 步骤7：编译（Release 模式，并行加速）
            -   name: Build (Linux) | 编译（Linux）
                if: matrix.os == 'ubuntu-latest'
                run: |
                    cd build
                    cmake --build . --parallel 4

            -   name: Build (Windows) | 编译（Windows）
                if: matrix.os == 'windows-latest'
                shell: pwsh
                run: cmake --build build --config Release --parallel 4

            # 步骤9：上传构建产物
            -   name: Upload build artifacts | 上传构建产物
                uses: actions/upload-artifact@v6
                with:
                    name: build-${{ matrix.os }}
                    path: |
                        build/**
                        !build/CMakeFiles/
                    retention-days: 7
