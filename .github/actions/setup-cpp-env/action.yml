name: '设置 C++ 构建环境'
description: '为不同的操作系统设置 C++ 编译环境'
inputs:
    os:
        description: '操作系统 (ubuntu-latest, windows-latest, macos-latest)'
        required: true
    compiler:
        description: '编译器 (gcc, clang, msvc)'
        required: false
        default: ''
    build-type:
        description: '构建类型 (Debug, Release, RelWithDebInfo, MinSizeRel)'
        required: false
        default: 'Release'

runs:
    using: 'composite'
    steps:
        -   name: 安装 Linux 依赖 (Ubuntu)
            if: inputs.os == 'ubuntu-latest'
            shell: bash
            run: |
                sudo apt-get update
                sudo apt-get install -y \
                  build-essential \
                  cmake \
                  ninja-build \
                  g++-13 \
                  clang-16 \
                  lcov \
                  python3-pip
                sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
                sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
                sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-16 100
                sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-16 100

        -   name: 安装 Windows 依赖
            if: inputs.os == 'windows-latest'
            shell: bash
            run: |
                # 安装 Chocolatey 包管理器
                choco install -y \
                  ninja \
                  cmake \
                  visualstudio2022buildtools \
                  visualstudio2022-workload-vctools \
                  boost-msvc-14.3 \
                  python
                
                # 添加 CMake 到 PATH
                echo "C:\Program Files\CMake\bin" >> $GITHUB_PATH
                echo "C:\Program Files\Ninja" >> $GITHUB_PATH
                
                # 安装 vcpkg（可选）
                git clone https://github.com/Microsoft/vcpkg.git
                ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
                echo "VCPKG_ROOT=$(pwd)/vcpkg" >> $GITHUB_ENV

        -   name: 安装 macOS 依赖
            if: inputs.os == 'macos-latest'
            shell: bash
            run: |
                # 安装 Homebrew
                /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
                echo "eval $(/opt/homebrew/bin/brew shellenv)" >> $HOME/.zprofile
                eval $(/opt/homebrew/bin/brew shellenv)
                
                # 安装工具链
                brew install \
                  cmake \
                  ninja \
                  llvm@15 \
                  boost \
                  fmt \
                  gcc \
                  conan
                
                # 设置 LLVM 环境
                echo "/opt/homebrew/opt/llvm@15/bin" >> $GITHUB_PATH
                echo "LDFLAGS=-L/opt/homebrew/opt/llvm@15/lib" >> $GITHUB_ENV
                echo "CPPFLAGS=-I/opt/homebrew/opt/llvm@15/include" >> $GITHUB_ENV

        -   name: 设置编译器环境变量
            shell: bash
            run: |
                case "${{ inputs.os }}-${{ inputs.compiler }}" in
                  "ubuntu-latest-gcc")
                    echo "CC=gcc-12" >> $GITHUB_ENV
                    echo "CXX=g++-12" >> $GITHUB_ENV
                    ;;
                  "ubuntu-latest-clang")
                    echo "CC=clang-15" >> $GITHUB_ENV
                    echo "CXX=clang++-15" >> $GITHUB_ENV
                    ;;
                  "macos-latest-*")
                    echo "CC=/opt/homebrew/opt/llvm@15/bin/clang" >> $GITHUB_ENV
                    echo "CXX=/opt/homebrew/opt/llvm@15/bin/clang++" >> $GITHUB_ENV
                    ;;
                esac

        -   name: 验证工具安装
            shell: bash
            run: |
                echo "=== 工具版本信息 ==="
                cmake --version
                if [[ "${{ inputs.os }}" == "ubuntu-latest" || "${{ inputs.os }}" == "macos-latest" ]]; then
                  gcc --version 2>/dev/null || echo "GCC not installed"
                  clang --version 2>/dev/null || echo "Clang not installed"
                  ninja --version
                  conan --version 2>/dev/null || echo "Conan not installed"
                else
                  echo "Windows环境 - 跳过版本检查"
                fi